# yaml-language-server: $schema=../../schema/connector.schema.json
#
# GitHub connector — Tier 1 reference manifest.
#
# Demonstrates the full connector shape: branded icon, both inbound (webhook)
# and outbound (REST API) halves, multiple operations covering the
# read / write / pagination cases, and the per-(connector, op) concurrency
# block. Use this as the source-of-truth example when writing a new manifest.
#
# Nothing in this file is GitHub-specific in the framework — every keyword
# is described in the schema at connectors/schema/connector.schema.json.

schema_version: "1.0"
name: github
display: GitHub
category: Provider
version: "1.0"

description: |
  Repository, pull-request, and workflow events. Comment back on issues,
  open PRs, merge PRs, react to webhook events, all signed with
  X-Hub-Signature-256 on the way in and a personal access token on
  the way out.

ui:
  icon: { file: "./icon.svg" }
  brand_color: "#181717"
  hover_blurb: "Comment on issues, open PRs, react to repo events."
  highlights:
    - pull_request
    - issues
    - push
    - workflow_run
  docs_url: "https://docs.agentfield.ai/connectors/github"

# ─── Outbound credentials ───────────────────────────────────────────────────
auth:
  strategy: bearer
  secret_env: GITHUB_PAT
  description: |
    GitHub personal access token. Fine-grained tokens are recommended;
    classic tokens need at least `repo` and `workflow` scopes for the
    operations below. Generate at
    https://github.com/settings/tokens?type=beta.

# ─── Inbound (webhook) ──────────────────────────────────────────────────────
inbound:
  source_kind: http
  signature:
    strategy: hub_signature_256
    secret_env: GITHUB_WEBHOOK_SECRET
  event_types:
    - pull_request
    - issues
    - push
    - workflow_run

# ─── Outbound operations ────────────────────────────────────────────────────
operations:

  create_comment:
    display: Create comment on issue or PR
    description: |
      Adds a comment to an existing GitHub issue or pull request.
      Returns the created comment's ID and HTML URL.
    method: POST
    url: "https://api.github.com/repos/{owner}/{repo}/issues/{number}/comments"
    inputs:
      owner:
        type: string
        in: path
        description: Repository owner (org or user login).
        example: "octocat"
      repo:
        type: string
        in: path
        description: Repository name.
        example: "hello-world"
      number:
        type: integer
        in: path
        description: Issue or PR number.
        example: 42
      body:
        type: string
        in: body
        description: Markdown content of the comment.
        example: "Thanks for the report — looking into it now."
    output:
      type: object
      schema:
        id:         { type: integer, jsonpath: "$.id" }
        html_url:   { type: string,  jsonpath: "$.html_url" }
        created_at: { type: string,  jsonpath: "$.created_at" }
    concurrency:
      max_in_flight: 5
    ui:
      operation_icon: { lucide: MessageSquare }
      tags: [write, social]

  list_issues:
    display: List issues in a repository
    description: |
      Returns issues for a repository. By default lists open issues only;
      pass `state: closed` or `state: all` to widen. Pull requests are
      issues to GitHub, so they appear in this list — filter on the
      caller side if needed.
    method: GET
    url: "https://api.github.com/repos/{owner}/{repo}/issues"
    inputs:
      owner:
        type: string
        in: path
        description: Repository owner (org or user login).
      repo:
        type: string
        in: path
        description: Repository name.
      state:
        type: string
        in: query
        default: open
        enum: [open, closed, all]
        description: Filter by issue state.
    paginate:
      strategy: github_link_header
      max_pages: 10
    output:
      type: array
      schema:
        items:
          number:    { jsonpath: "$.number" }
          title:     { jsonpath: "$.title" }
          state:     { jsonpath: "$.state" }
          html_url:  { jsonpath: "$.html_url" }
          author:    { jsonpath: "$.user.login" }
          created_at: { jsonpath: "$.created_at" }
    concurrency:
      max_in_flight: 5
    ui:
      operation_icon: { lucide: List }
      tags: [read]

  create_issue:
    display: Open a new issue
    description: |
      Creates a new issue in the target repository. Caller must include a
      title; body is optional but strongly recommended for triage.
    method: POST
    url: "https://api.github.com/repos/{owner}/{repo}/issues"
    inputs:
      owner:
        type: string
        in: path
        description: Repository owner (org or user login).
      repo:
        type: string
        in: path
        description: Repository name.
      title:
        type: string
        in: body
        description: One-line summary of the issue.
        example: "API client throws on 401 instead of refreshing token"
      body:
        type: string
        in: body
        description: Markdown-formatted issue body.
      labels:
        type: array
        in: body
        description: Optional labels to apply at creation time.
        items: { type: string }
    output:
      type: object
      schema:
        number:   { type: integer, jsonpath: "$.number" }
        html_url: { type: string,  jsonpath: "$.html_url" }
        state:    { type: string,  jsonpath: "$.state" }
    concurrency:
      max_in_flight: 3
    ui:
      operation_icon: { lucide: Plus }
      tags: [write]

  merge_pr:
    display: Merge a pull request
    description: |
      Merges an open pull request. Returns the merge commit SHA on success.
      Caller is responsible for deciding when a PR is ready to merge —
      this connector does not gate on review state.
    method: PUT
    url: "https://api.github.com/repos/{owner}/{repo}/pulls/{number}/merge"
    inputs:
      owner:
        type: string
        in: path
        description: Repository owner (org or user login).
      repo:
        type: string
        in: path
        description: Repository name.
      number:
        type: integer
        in: path
        description: PR number to merge.
      commit_title:
        type: string
        in: body
        description: Merge commit title (defaults to PR title).
      commit_message:
        type: string
        in: body
        description: Merge commit body.
      merge_method:
        type: string
        in: body
        default: merge
        enum: [merge, squash, rebase]
        description: Strategy for combining the PR's commits.
    output:
      type: object
      schema:
        sha:     { type: string,  jsonpath: "$.sha" }
        merged:  { type: boolean, jsonpath: "$.merged" }
        message: { type: string,  jsonpath: "$.message" }
    concurrency:
      max_in_flight: 2
    ui:
      operation_icon: { lucide: GitMerge }
      tags: [write, destructive]

# ─── Per-connector concurrency ──────────────────────────────────────────────
concurrency:
  max_in_flight: 25                  # cap on total concurrent ops on this connector
  default_op_max_in_flight: 10       # default for ops that omit their own field
