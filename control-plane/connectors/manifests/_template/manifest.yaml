# yaml-language-server: $schema=../../schema/connector.schema.json
#
# Connector manifest template — copy this directory and rename to add a new
# connector. Every field below is documented; delete what you don't need.
# Run `make connector-lint` to validate before opening a PR.

schema_version: "1.0"          # always "1.0" for v1 manifests
name: example                  # lowercase, snake_case, must match directory name
display: Example Service       # human-readable name shown in the UI
category: Provider             # Provider | Schedule | Generic | Internal
version: "1.0"                 # semver — bump major when introducing breaking ops

description: |
  One-paragraph description of what this connector does. Surfaces in the
  Integrations card, the SDK docstring header, and the
  agentfield-multi-reasoner-builder skill reference. Be concrete — operators
  scan these to decide whether the connector solves their problem.

# ─── UI presentation ────────────────────────────────────────────────────────
ui:
  icon: { file: "./icon.svg" } # branded SVG sitting next to this manifest, OR
  # icon: { lucide: Webhook }  # any lucide-react name for generic connectors
  brand_color: "#000000"
  hover_blurb: "Short tooltip-sized blurb."
  highlights:                  # chips on the Integrations catalog card
    - sample_event_a
    - sample_event_b
  docs_url: "https://docs.agentfield.ai/connectors/example"

# ─── Outbound credentials ───────────────────────────────────────────────────
# Strategies are registered in control-plane/internal/connectors/auth/.
# Pick from: bearer | apikey_header | apikey_query | hmac | oauth2 | aws_sigv4.
auth:
  strategy: bearer
  secret_env: EXAMPLE_API_KEY
  description: How to obtain the credential, where to set it.

# ─── Inbound (delete this whole block if connector is outbound-only) ────────
# inbound:
#   source_kind: http
#   signature:
#     strategy: hmac_sha256
#     secret_env: EXAMPLE_WEBHOOK_SECRET
#   event_types:
#     - some.event
#     - another.event

# ─── Outbound operations ────────────────────────────────────────────────────
operations:

  example_op:
    display: Example operation
    description: |
      Plain-language description of what this operation does. The first
      sentence becomes the Python/TS docstring summary.
    method: POST                    # GET | POST | PUT | PATCH | DELETE
    url: "https://api.example.com/v1/widgets/{widget_id}"
    inputs:
      widget_id:
        type: string
        in: path                    # path | query | body | header
        description: ID of the widget to update.
        example: "widget_42"
      payload:
        type: object
        in: body
        description: New widget shape.
    output:
      type: object
      schema:
        id:         { type: string, jsonpath: "$.id" }
        updated_at: { type: string, jsonpath: "$.updated_at" }
    # Optional — omit to inherit per-connector default below.
    concurrency:
      max_in_flight: 5
    ui:
      operation_icon: { lucide: Pencil }
      tags: [write]

# ─── Per-connector concurrency ──────────────────────────────────────────────
concurrency:
  max_in_flight: 25
  default_op_max_in_flight: 10
